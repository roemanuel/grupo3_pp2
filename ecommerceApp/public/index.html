<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop Me</title>
    <!-- Link a Bootstrap 5 (CDN) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body class="bg-white">
    <!-- Barra de Navegación -->
    <nav class="navbar sticky-top shadow-sm" style="background-color:#111827; z-index:1030;">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1 text-white fw-bold" style="letter-spacing:1px;">Shop Me</span>
            <button class="btn" style="background-color:#A78BFA; color:#fff; font-weight:600;">
                🛒 Carrito (<span id="cart-count">0</span>)
            </button>
        </div>
    </nav>
    <!-- Alertas -->
    <div class="position-fixed top-0 end-0 p-3" style="z-index: 2000;">
        <div id="cart-alert" class="alert alert-success alert-dismissible fade" role="alert" style="min-width: 250px;">
            <span id="cart-alert-msg"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Cerrar"></button>
        </div>
    </div>
    <!-- Contenedor Principal -->
    <div class="container mt-5" id="app">
        <h2 class="fw-bold mb-4 text-center" style="letter-spacing: 1px; color:#374151;">Catálogo de Productos</h2>
        <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 g-4" id="catalogo">
        </div>
    </div>
    <!-- Footer -->
    <footer class="mt-5 pt-4 pb-3" style="background-color:#374151; color:#fff;">
        <div class="container text-center">
            <div class="mb-2">
                <span class="fw-bold" style="color:#A78BFA; font-size:1.2em;">Shop Me</span>
            </div>
            <div class="mb-2">
                <small>© 2026 Shop Me. Todos los derechos reservados.</small>
            </div>
            <div>
                <a href="#" class="text-decoration-none me-3" style="color:#F59E0B;">Instagram</a>
                <a href="#" class="text-decoration-none me-3" style="color:#F59E0B;">Facebook</a>
                <a href="#" class="text-decoration-none" style="color:#F59E0B;">Contacto</a>
            </div>
        </div>
    </footer>
    <!-- Modal Carrito -->
    <div class="modal fade" id="cartModal" tabindex="-1" aria-labelledby="cartModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold" id="cartModalLabel">🛒 Carrito de Compras</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
                </div>
                <div class="modal-body">
                    <div id="cart-items"></div>
                    <div class="text-end mt-3">
                        <span class="fw-bold">Total: $<span id="cart-total">0</span></span>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
                    <button type="button" class="btn btn-primary" id="checkout-btn" disabled>Finalizar compra</button>
                </div>
            </div>
        </div>
    </div>
    <!-- Link a nuestra lógica de JavaScript (Para la Actividad 2) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script type="module" src="app.js"></script>
</body>
